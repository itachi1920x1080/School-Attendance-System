<div class="flex flex-col gap-6 w-full font-khmer">
    
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 justify-between items-center">
        <div>
            <h2 class="text-xl font-bold text-slate-800">កត់វត្តមានសិស្ស (Take Attendance)</h2>
            <p class="text-sm text-slate-500">សូមបំពេញមុខវិជ្ជា និងកត់ត្រាវត្តមានខាងក្រោម</p>
        </div>
        <div class="flex gap-4 w-full md:w-auto">
            <input type="date" x-model="attendanceForm.date" class="border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-emerald-600 outline-none">
            <input type="text" x-model="attendanceForm.course" placeholder="ឈ្មោះមុខវិជ្ជា..." class="border border-slate-200 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-emerald-600 outline-none w-full md:w-48">
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <th class="p-4 w-16 text-center">ល.រ</th>
                    <th class="p-4">ឈ្មោះសិស្ស</th>
                    <th class="p-4">អត្តលេខ</th>
                    <th class="p-4 text-center">វត្តមាន (Present)</th>
                    <th class="p-4 text-center">អវត្តមាន (Absent)</th>
                    <th class="p-4 text-center">ច្បាប់ (Leave)</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <template x-for="(student, index) in users.filter(u => u.role === 'Student')" :key="student.id">
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                        <td class="p-4 text-center text-slate-400 font-bold" x-text="index + 1"></td>
                        <td class="p-4 font-bold text-slate-800" x-text="student.name"></td>
                        <td class="p-4 text-slate-500 font-medium" x-text="student.id_number || 'N/A'"></td>
                        
                        <td class="p-4 text-center">
                            <input type="radio" :name="'attendance_'+student.id" value="present" x-model="attendanceForm.records[student.id]" class="w-5 h-5 text-emerald-600 focus:ring-emerald-600 cursor-pointer">
                        </td>
                        <td class="p-4 text-center">
                            <input type="radio" :name="'attendance_'+student.id" value="absent" x-model="attendanceForm.records[student.id]" class="w-5 h-5 text-rose-500 focus:ring-rose-500 cursor-pointer">
                        </td>
                        <td class="p-4 text-center">
                            <input type="radio" :name="'attendance_'+student.id" value="leave" x-model="attendanceForm.records[student.id]" class="w-5 h-5 text-amber-500 focus:ring-amber-500 cursor-pointer">
                        </td>
                    </tr>
                </template>
                
                <tr x-show="users.filter(u => u.role === 'Student').length === 0">
                    <td colspan="6" class="p-8 text-center text-slate-400">មិនមានទិន្នន័យសិស្សនៅក្នុងប្រព័ន្ធទេ!</td>
                </tr>
            </tbody>
        </table>
        
        <div class="p-4 bg-slate-50 border-t border-slate-100 flex justify-end">
            <button @click="submitAttendance()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-emerald-200 flex items-center gap-2">
                <i class="fas fa-save"></i> រក្សាទុកវត្តមាន
            </button>
        </div>
    </div>
</div>
