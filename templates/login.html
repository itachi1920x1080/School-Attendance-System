<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | School System</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center bg-no-repeat bg-cover bg-center"
    style="background-image: url('{{ url_for('static', filename='image/image copy 5.png') }}');">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-lg border border-slate-100 p-8 md:p-10" x-data="{ isLoading: false }">
        
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white font-bold text-2xl mb-5 shadow-md shadow-blue-200">
                S
            </div>
            <h1 class="text-2xl font-bold text-slate-800">SCHOOL SYSTEM</h1>
            <p class="text-slate-500 text-sm mt-2">Please enter your credentials to access your portal.</p>
        </div>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
          {% if messages %}
            <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm mb-6 flex items-center gap-3">
                <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="font-medium">{{ messages[0] }}</span>
            </div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5" @submit="isLoading = true">
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email Address</label>
                <input 
                    type="email" 
                    name="email" 
                    required 
                    placeholder="user@school.edu" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all text-sm bg-slate-50 focus:bg-white"
                >
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    required 
                    placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition-all text-sm bg-slate-50 focus:bg-white"
                >
            </div>

            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="remember" class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-600">
                    <span class="text-sm font-medium text-slate-600">Remember me</span>
                </label>
                <a href="#" class="text-sm font-bold text-blue-600 hover:text-blue-800 transition-colors">Forgot password?</a>
            </div>

            <button 
                type="submit" 
                :disabled="isLoading" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2 mt-4 disabled:opacity-70 disabled:cursor-not-allowed"
            >
                <span x-show="!isLoading">Sign In</span>
                
                <svg x-show="isLoading" class="animate-spin w-5 h-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" x-cloak>
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div class="mt-8 text-center text-sm font-medium text-slate-500">
            Don't have an account? 
            <a href="{{ url_for('contact_support') }}" class="font-bold text-blue-600 hover:text-blue-800 transition-colors">
                Contact IT Support
            </a>
        </div>
        
    </div>

</body>
</html>
