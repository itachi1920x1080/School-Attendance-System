<div x-show="activeTab === 'timetable'" x-cloak class="flex flex-col gap-6 w-full font-khmer">
    
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h2 class="text-2xl font-bold text-slate-800">កាលវិភាគសិក្សា (Timetable)</h2>
            <p class="text-sm text-slate-500">កាលវិភាគប្រចាំសប្តាហ៍</p>
        </div>
        
        <template x-if="role === 'admin'">
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-blue-100 flex items-center gap-2">
                <i class="fas fa-plus"></i> បន្ថែមមុខវិជ្ជា
            </button>
        </template>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
        
        <template x-for="day in ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday']" :key="day">
            
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden flex flex-col">
                <div class="bg-slate-50 p-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-bold text-slate-700 text-lg uppercase tracking-wide" x-text="day"></h3>
                    <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xs font-bold"
                         x-text="timetables.filter(t => t.day_of_week === day).length">
                    </div>
                </div>
                
                <div class="p-4 flex flex-col gap-3 flex-1 bg-slate-50/50">
                    <template x-for="subject in timetables.filter(t => t.day_of_week === day)" :key="subject.id">
                        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden group">
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500 group-hover:bg-blue-600 transition-colors"></div>
                            
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="font-bold text-slate-800 text-sm" x-text="subject.subject_name"></h4>
                                <span class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-1 rounded-md" x-text="subject.room"></span>
                            </div>
                            
                            <div class="flex items-center gap-2 text-xs text-slate-500 mb-2 font-medium">
                                <i class="far fa-clock text-blue-400"></i>
                                <span x-text="subject.start_time + ' - ' + subject.end_time"></span>
                            </div>
                            
                            <div class="flex items-center gap-2 text-xs text-slate-500">
                                <i class="fas fa-chalkboard-teacher text-slate-400"></i>
                                <span x-text="subject.teacher_name || 'មិនទាន់កំណត់គ្រូ'"></span>
                            </div>
                            
                            <div class="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between text-[10px] text-slate-400 font-bold uppercase">
                                <span x-text="subject.department_name"></span>
                                <span x-text="subject.year_name"></span>
                            </div>
                        </div>
                    </template>
                    
                    <div x-show="timetables.filter(t => t.day_of_week === day).length === 0" class="flex-1 flex items-center justify-center py-6">
                        <p class="text-sm text-slate-400 italic">មិនមានថ្នាក់រៀនទេ</p>
                    </div>
                </div>
            </div>
            
        </template>
        
    </div>
</div>
