<div x-show="admin_edit_att_modal"
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-cloak>
    
    <div @click.away="admin_edit_att_modal = false"
         class="bg-white rounded-[24px] shadow-2xl border border-slate-100 w-full max-w-md overflow-hidden flex flex-col font-khmer">
        
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center text-amber-600">
                    <i class="fas fa-user-edit"></i>
                </div>
                <span>កែប្រែស្ថានភាពវត្តមាន</span>
            </h3>
            <button type="button" @click="admin_edit_att_modal = false" class="text-slate-400 hover:text-rose-500 transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <div class="p-6 space-y-4 bg-slate-50/30">
            <div class="p-3 bg-blue-50 text-blue-800 rounded-xl text-sm border border-blue-100">
                <div class="mb-1 text-slate-500 text-xs">កំពុងកែប្រែវត្តមានសម្រាប់៖</div>
                សិស្ស៖ <span class="font-bold" x-text="editAttForm.student_name"></span><br>
                មុខវិជ្ជា៖ <span class="font-bold" x-text="editAttForm.subject_name"></span>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ស្ថានភាពថ្មី</label>
                <select x-model="editAttForm.status" 
                        class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition-all cursor-pointer">
                    <option value="Present" class="text-emerald-600">វត្តមាន (Present)</option>
                    <option value="Absent" class="text-rose-600">អវត្តមាន (Absent)</option>
                    <option value="Late" class="text-amber-600">យឺត (Late)</option>
                    <option value="Excused" class="text-blue-600">ច្បាប់ (Excused)</option>
                </select>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">មូលហេតុ / ចំណាំ</label>
                <input type="text" x-model="editAttForm.remarks" placeholder="ឧ. សុំច្បាប់ទៅពេទ្យ, ស្ទះចរាចរណ៍..." 
                       class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition-all">
            </div>
        </div>

        <div class="px-6 py-4 border-t border-slate-100 bg-white flex justify-end gap-3">
            <button type="button" @click="admin_edit_att_modal = false" class="px-5 py-2 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-all">បោះបង់</button>
            
            <button type="button" @click="saveAdminAttendanceEdit()" class="px-5 py-2 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition-all shadow-lg shadow-amber-200 flex items-center gap-2">
                <i class="fas fa-save"></i> រក្សាទុក
            </button>
        </div>
    </div>
</div>
