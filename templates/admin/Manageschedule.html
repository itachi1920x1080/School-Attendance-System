<div x-show="activeTab === 'admin_schedule'" x-cloak class="p-6 font-khmer space-y-6">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6">
        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600">
                <i class="fas fa-calendar-alt"></i>
            </div>
            គ្រប់គ្រងកាលវិភាគសិក្សា
        </h2>

        <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">

            <!-- ១. ដេប៉ាតឺម៉ង់ -->
            <label for="filter_department" class="sr-only">ជ្រើសរើសដេប៉ាតឺម៉ង់</label>
            <select id="filter_department"
                title="ជ្រើសរើសដេប៉ាតឺម៉ង់"
                x-model="scheduleFilter.department_id"
                @change="filterSchedules()"
                class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm flex-1 sm:flex-none">
                <option value="">-- គ្រប់ដេប៉ាតឺម៉ង់ --</option>
                {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.department_name }}</option>
                {% endfor %}
            </select>

            <!-- ២. ឆ្នាំសិក្សា (Alpine) -->
            <label for="filter_academic_year" class="sr-only">ជ្រើសរើសឆ្នាំសិក្សា</label>
            <select id="filter_academic_year"
                title="ជ្រើសរើសឆ្នាំសិក្សា"
                x-model="scheduleFilter.academic_year_id"
                @change="filterSchedules()"
                class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm flex-1 sm:flex-none">
                <option value="">-- គ្រប់ឆ្នាំសិក្សា --</option>
                <template x-for="year in academic_years" :key="year.id">
                    <option :value="year.id" x-text="year.year_name"></option>
                </template>
            </select>

            <!-- ៣. ថ្នាក់ (Jinja2) -->
            <label for="filter_class" class="sr-only">ជ្រើសរើសថ្នាក់</label>
            <select id="filter_class"
                title="ជ្រើសរើសថ្នាក់"
                x-model="scheduleFilter.class_id"
                @change="filterSchedules()"
                class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm flex-1 sm:flex-none">
                <option value="">-- គ្រប់ថ្នាក់ --</option>
                {% for cls in classes %}
                    <option value="{{ cls.id }}">{{ cls.class_name }}</option>
                {% endfor %}
            </select>
            <!-- ៤. អាគារ (Alpine) -->
            <label for="filter_building" class="sr-only">ជ្រើសរើសអាគារ</label>
            <select id="filter_building"
                title="ជ្រើសរើសអាគារ"
                x-model="scheduleFilter.building_id"
                @change="filterSchedules()"
                class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm flex-1 sm:flex-none">
                <option value="">-- គ្រប់អាគារ --</option>
                <template x-for="b in buildings" :key="b.id">
                    <option :value="b.id" x-text="b.building_name"></option>
                </template>
            </select>

            <!-- ៥. Grid / Table toggle -->
            <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                <button type="button" @click="scheduleViewMode = 'grid'"
                        :class="scheduleViewMode === 'grid' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all">
                    <i class="fas fa-th"></i> ម៉ាឌ្រាស
                </button>
                <button type="button" @click="scheduleViewMode = 'table'"
                        :class="scheduleViewMode === 'table' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                        class="px-4 py-1.5 rounded-lg text-sm font-medium transition-all">
                    <i class="fas fa-list"></i> តារាង
                </button>
            </div>

            <!-- ៦. បន្ថែមម៉ោងរៀន -->
            <button type="button" @click="openAddModal()"
                class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition-all flex items-center justify-center gap-2 shadow-sm font-bold text-sm w-full sm:w-auto">
                <i class="fas fa-plus"></i> បន្ថែមម៉ោងរៀន
            </button>

        </div>
    </div>

    <!-- CALENDAR GRID VIEW -->
    <div x-show="scheduleViewMode === 'grid'" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto">
        <table class="w-full border-collapse text-xs">
            <thead>
                <tr class="bg-slate-900 text-white">
                    <th class="px-4 py-3 border border-slate-300 font-bold text-left w-20">ម៉ោង</th>
                    <th class="px-4 py-3 border border-slate-300 font-bold text-center">ថ្ងៃច័ន្ទ</th>
                    <th class="px-4 py-3 border border-slate-300 font-bold text-center">ថ្ងៃអង្គារ</th>
                    <th class="px-4 py-3 border border-slate-300 font-bold text-center">ថ្ងៃពុធ</th>
                    <th class="px-4 py-3 border border-slate-300 font-bold text-center">ថ្ងៃព្រហស្បតិ៍</th>
                    <th class="px-4 py-3 border border-slate-300 font-bold text-center">ថ្ងៃសុក្រ</th>
                    <th class="px-4 py-3 border border-slate-300 font-bold text-center">ថ្ងៃសៅរ៍</th>
                    <th class="px-4 py-3 border border-slate-300 font-bold text-center">ថ្ងៃអាទិត្យ</th>
                </tr>
            </thead>
            <tbody>
                <template x-for="hour in Array.from({length: 13}, (_, i) => i + 7)" :key="hour">
                    <tr class="border-b border-slate-300">
                        <td class="px-4 py-3 bg-slate-50 font-bold text-slate-700 border border-slate-300 w-20">
                            <span x-text="String(hour).padStart(2, '0') + ':00'"></span>
                        </td>
                        <template x-for="day in ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday']" :key="day">
                            <td class="px-2 py-2 border border-slate-300 align-top h-24 relative bg-slate-50 hover:bg-slate-100 transition-colors">
                                <template x-for="schedule in filteredSchedulesList.filter(s => s.day_of_week === day && parseInt(s.start_time.split(':')[0]) === hour)" :key="schedule.id">
                                    <div class="absolute inset-0 m-1 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-lg p-2 shadow-sm cursor-pointer hover:shadow-lg transition-all group overflow-hidden"
                                         @click="editSchedule(schedule)">
                                        <div class="text-xs font-bold truncate group-hover:text-blue-100" x-text="schedule.subject_name"></div>
                                        <div class="text-xs text-blue-100 truncate" x-text="'Room: ' + (schedule.room_number || schedule.room_display || 'N/A')"></div>
                                        <div class="text-xs text-blue-100 truncate" x-text="schedule.teacher_name || 'N/A'"></div>
                                        <div class="absolute top-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <button type="button" @click.stop="deleteSchedule(schedule.id)" class="text-red-200 hover:text-red-100 text-xs">
                                                <i class="fas fa-times"></i>
                                            </button>
                                        </div>
                                    </div>
                                </template>
                            </td>
                        </template>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <!-- TABLE VIEW -->
    <div x-show="scheduleViewMode === 'table'" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-900 text-white text-xs uppercase tracking-wider">
                <tr>
                    <th class="px-6 py-4">ថ្ងៃ</th>
                    <th class="px-6 py-4">មុខវិជ្ជា</th>
                    <th class="px-6 py-4">ដេប៉ាតឺម៉ង់</th>
                    <th class="px-6 py-4">ម៉ោងសិក្សា</th>
                    <th class="px-6 py-4">បន្ទប់</th>
                    <th class="px-6 py-4">គ្រូបង្រៀន</th>
                    <th class="px-6 py-4">ឆ្នាំសិក្សា</th>
                    <th class="px-6 py-4 text-center">សកម្មភាព</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100">
                <template x-for="item in filteredSchedulesList" :key="item.id">
                    <tr class="hover:bg-indigo-50 transition-colors">
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center gap-2 px-3 py-1.5 bg-indigo-100 text-indigo-700 rounded-full text-sm font-bold">
                                <i class="fas fa-calendar-day"></i>
                                <span x-text="item.day_of_week"></span>
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <div class="font-bold text-slate-800" x-text="item.subject_name"></div>
                        </td>
                        <td class="px-6 py-4 text-slate-600 text-sm" x-text="item.department_name"></td>
                        <td class="px-6 py-4">
                            <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold"
                                  x-text="formatTime(item.start_time) + ' - ' + formatTime(item.end_time)"></span>
                        </td>
                        <td class="px-6 py-4 text-slate-700 font-medium">
                            <i class="fas fa-door-open text-slate-400 mr-2"></i>
                            <span x-text="item.room_display || item.room_number || item.room_name || item.room || 'N/A'"></span>
                        </td>
                        <td class="px-6 py-4 text-sm text-slate-600" x-text="item.teacher_name || 'N/A'"></td>
                        <td class="px-6 py-4 text-center">
                            <span class="inline-flex items-center gap-1 px-2.5 py-1 bg-amber-50 text-amber-700 rounded-full text-xs font-bold">
                                <i class="fas fa-bookmark"></i>
                                <span x-text="item.academic_year || 'N/A'"></span>
                            </span>
                        </td>
                        <td class="px-6 py-4 text-center space-x-2">
                            <button type="button" @click="editSchedule(item)" class="inline-flex items-center justify-center w-8 h-8 text-blue-500 hover:bg-blue-100 hover:text-blue-700 rounded-lg transition-all">
                                <i class="fas fa-pen text-sm"></i>
                            </button>
                            <button type="button" @click="deleteSchedule(item.id)" class="inline-flex items-center justify-center w-8 h-8 text-rose-500 hover:bg-rose-100 hover:text-rose-700 rounded-lg transition-all">
                                <i class="fas fa-trash-alt text-sm"></i>
                            </button>
                        </td>
                    </tr>
                </template>
                <template x-if="filteredSchedulesList.length === 0">
                    <tr>
                        <td colspan="8" class="px-6 py-16 text-center text-slate-400 font-medium">
                            <div class="flex flex-col items-center justify-center gap-3">
                                <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center">
                                    <i class="fas fa-calendar-times text-2xl text-slate-300"></i>
                                </div>
                                <span>មិនមានកាលវិភាគសិក្សាដែលត្រូវនឹងការស្វែងរកឡើយ</span>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    {% include 'admin/add_schedule.html' %}
</div>
