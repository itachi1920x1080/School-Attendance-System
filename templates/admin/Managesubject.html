<div x-show="activeTab === 'admin_subject'" x-cloak class="space-y-6 font-khmer">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <h2 class="text-xl font-bold text-slate-800">បញ្ជីមុខវិជ្ជា (Subjects)</h2>
        
        <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-sm"></i>
                <input type="text" 
                       x-model="searchQuery" 
                       placeholder="ស្វែងរកមុខវិជ្ជា, ដេប៉ាតឺម៉ង់..." 
                       class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all">
            </div>
            
            <button @click="add_subject_modal = true" 
                    class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 whitespace-nowrap">
                <i class="fas fa-plus"></i> បន្ថែមមុខវិជ្ជា
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <th class="p-4">ឈ្មោះមុខវិជ្ជា</th>
                    <th class="p-4 text-center">ចំនួនក្រេឌីត</th>
                    <th class="p-4">ដេប៉ាតឺម៉ង់</th>
                    <th class="p-4 text-right">សកម្មភាព</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <template x-for="sub in filteredSubjects" :key="sub.id">
                    <tr class="border-b border-slate-50 hover:bg-indigo-50/30 transition-colors duration-200">
                        <td class="p-4">
                            <div class="font-bold text-slate-700" x-text="sub.subject_name"></div>
                            <div class="text-[11px] text-indigo-500 font-medium mt-1">
                                <span x-text="sub.year_name || 'មិនបញ្ជាក់ឆ្នាំ'"></span>
                                <span class="mx-1">•</span>
                                <span x-text="'ឆមាសទី ' + (sub.semester || '?')"></span>
                            </div>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 bg-slate-100 text-slate-700 rounded-lg text-xs font-bold" 
                                  x-text="(sub.credits || 3) + ' ក្រេឌីត'"></span>
                        </td>
                        <td class="p-4 text-slate-600 font-medium text-xs" x-text="sub.department_name"></td>
                        <td class="p-4 text-right">
                            <div class="flex justify-end gap-2">
                                <button @click="openEditSubjectModal(sub)" class="p-2 text-amber-500 hover:bg-amber-50 rounded-lg transition-colors">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button @click="deleteSubject(sub.id)" class="p-2 text-rose-600 hover:bg-rose-50 rounded-lg transition-colors">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>

                <tr x-show="filteredSubjects.length === 0">
                    <td colspan="4" class="p-12 text-center text-slate-400 italic">មិនមានទិន្នន័យមុខវិជ្ជាឡើយ...</td>
                </tr>
            </tbody>
        </table>
    </div>

    {% include 'admin/add_subject.html' %}
    {% include 'admin/Edit_Subject.html' %}
</div>
