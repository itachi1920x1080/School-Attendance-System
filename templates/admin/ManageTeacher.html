<div x-show="activeTab === 'admin_teacher'" x-cloak class="space-y-6 font-khmer">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <h2 class="text-xl font-bold text-slate-800">បញ្ជីគ្រូបង្រៀន (Teachers)</h2>
        
        <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-sm"></i>
                <input type="text"
                       x-model="teacherSearchQuery"
                       placeholder="ស្វែងរកឈ្មោះគ្រូ, អត្តលេខ..."
                       class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-600 transition-all">
            </div>

            <div>
                <select x-model="teacherDepartmentFilter"
                        @change="onTeacherDepartmentFilterChange()"
                        title="តម្រៀបតាមដេប៉ាតឺម៉ង់"
                        aria-label="តម្រៀបតាមដេប៉ាតឺម៉ង់"
                        class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm">
                    <option value="">ទាំងអស់ដេប៉ាតឺម៉ង់</option>
                    <template x-for="dept in departments" :key="dept.id">
                        <option :value="String(dept.id)" x-text="dept.department_name"></option>
                    </template>
                </select>
            </div>

            <div>
                <select x-model="teacherSubjectFilter"
                        title="តម្រៀបតាមមុខវិជ្ជា"
                        aria-label="តម្រៀបតាមមុខវិជ្ជា"
                        class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm">
                    <option value="">ទាំងអស់មុខវិជ្ជា</option>
                    <template x-for="subj in teacherSubjectOptions" :key="subj.id">
                        <option :value="String(subj.id)"
                                x-text="teacherDepartmentFilter ? subj.subject_name : `${subj._department_name || 'N/A'} - ${subj.subject_name}`">
                        </option>
                    </template>
                </select>
            </div>

            <div>
                <select x-model="teacherStatusFilter"
                        title="តម្រៀបតាមស្ថានភាព"
                        aria-label="តម្រៀបតាមស្ថានភាព"
                        class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-600 outline-none transition-all shadow-sm">
                    <option value="">ទាំងអស់ស្ថានភាព</option>
                    <option value="Active">កំពុងបង្រៀន</option>
                    <option value="Inactive">ផ្អាកបង្រៀន</option>
                </select>
            </div>

            <button type="button" @click="openAddTeacherModal()"
                    class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-indigo-200 flex items-center justify-center gap-2 whitespace-nowrap">
                <i class="fas fa-user-plus"></i> បន្ថែមគ្រូបង្រៀន
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <th class="p-4">អត្តលេខ/ឈ្មោះគ្រូបង្រៀន</th>
                    <th class="p-4">ដេប៉ាតឺម៉ង់</th>
                    <th class="p-4">មុខវិជ្ជាជំនាញ</th>
                    <th class="p-4">ស្ថានភាព</th>
                    <th class="p-4 text-right">សកម្មភាព</th> 
                </tr>
            </thead>
            <tbody class="text-sm">
                <template x-for="teacher in filteredTeachers" :key="teacher.id">
                    <tr class="border-b border-slate-50 hover:bg-teal-50/30 transition-colors duration-200">
                        <td class="p-4">
                            <div class="font-bold text-slate-700" x-text="teacher.teacher_name"></div>
                            <div class="text-[10px] text-slate-400" x-text="teacher.teacher_code || 'គ្មានអត្តលេខ'"></div>
                        </td>
                        
                        <td class="p-4 text-slate-600 text-xs font-medium" x-text="teacher.department_name || 'N/A'"></td>
                        
                        <td class="p-4 text-xs font-semibold">
                            <span x-text="teacher.subject_teach"
                                  :class="teacher.subject_teach === 'មិនទាន់មានមុខវិជ្ជា' ? 'text-slate-400 italic font-normal' : 'text-slate-700 bg-teal-50 px-2 py-1 rounded border border-teal-100'">
                            </span>
                        </td>
                        
                        <td class="p-4">
                            <span :class="teacher.status === 'Active' ? 'bg-green-50 text-green-700 border-green-100' : 'bg-rose-50 text-rose-700 border-rose-100'"
                                  class="px-2.5 py-1 rounded-lg text-[11px] font-bold border" 
                                  x-text="teacher.status === 'Active' ? 'កំពុងបង្រៀន' : 'ផ្អាកបង្រៀន'">
                            </span>
                        </td>
                        
                        <td class="p-4 text-right">
                            <div class="flex justify-end gap-2">
                                <button @click.stop="openEditTeacherModal(teacher)" class="p-2 text-amber-500 hover:bg-amber-50 rounded-lg transition-colors" title="កែប្រែ">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button @click="deleteTeacher(teacher.id)" class="p-2 text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" title="លុបចោល">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>
                
                <tr x-show="filteredTeachers.length === 0" x-cloak>
                    <td colspan="5" class="p-12 text-center text-slate-400 italic">
                        <div class="flex flex-col items-center justify-center gap-3">
                            <i class="fas fa-folder-open text-4xl text-slate-300"></i>
                            <span>រកមិនឃើញទិន្នន័យគ្រូបង្រៀនឡើយ...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        
        {% include 'admin/add_teacher.html' %}
        {% include 'admin/Edit_teacher.html' %}
    </div>
</div>
