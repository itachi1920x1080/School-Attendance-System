<div x-show="activeTab === 'admin_users'" x-cloak class="space-y-6 font-khmer">
    
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6">
        <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 shadow-sm border border-blue-200">
                <i class="fas fa-users-cog"></i>
            </div>
            គ្រប់គ្រងអ្នកប្រើប្រាស់
        </h2>
        
        <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto">
            <div class="relative w-full sm:w-72">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-sm"></i>
                <input type="text" x-model="searchQuery" placeholder="ស្វែងរកឈ្មោះ, អ៊ីមែល, អត្តលេខ..."
                       class="w-full pl-9 pr-4 py-2.5 bg-white text-slate-700 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all shadow-sm">
            </div>

            <button type="button" @click="openUserModal('add')" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2 shadow-sm shadow-blue-200 font-bold text-sm w-full sm:w-auto">
                <i class="fas fa-user-plus"></i> បន្ថែមអ្នកប្រើប្រាស់
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-x-auto custom-scrollbar">
        <table class="w-full text-left border-collapse min-w-[1000px]">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">
                    <th class="p-4 w-1/4">ឈ្មោះ និង អ៊ីមែល</th>
                    <th class="p-4 w-32">អត្តលេខ</th>
                    <th class="p-4 w-32 text-center">តួនាទី</th>
                    <th class="p-4 w-1/4">ព័ត៌មានសិក្សា/ការងារ</th>
                    <th class="p-4 w-24 text-center">ស្ថានភាព</th>
                    <th class="p-4 w-24 text-center">សកម្មភាព</th> 
                </tr>
            </thead>
            <tbody class="text-sm divide-y divide-slate-50">
                <template x-for="user in filteredUsers" :key="user.id">
                    <tr class="hover:bg-blue-50/40 transition-colors duration-200">
                        
                        <td class="p-4">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center font-bold text-slate-600 shrink-0" 
                                     x-text="user.name ? user.name.charAt(0).toUpperCase() : 'U'"></div>
                                <div>
                                    <div class="font-bold text-slate-800" x-text="user.name"></div>
                                    <div class="text-[11px] text-slate-500 font-mono" x-text="user.email"></div>
                                </div>
                            </div>
                        </td>

                        <td class="p-4 text-slate-600 font-mono text-xs font-semibold" x-text="user.id_number || 'N/A'"></td>
                        
                        <td class="p-4 text-center">
                            <span class="px-2.5 py-1 rounded-lg text-[11px] font-bold border"
                                  :class="{
                                      'bg-violet-50 text-violet-700 border-violet-200': user.role === 'Admin',
                                      'bg-emerald-50 text-emerald-700 border-emerald-200': user.role === 'Teacher',
                                      'bg-blue-50 text-blue-700 border-blue-200': user.role === 'Student'
                                  }"
                                  x-text="user.role === 'Admin' ? 'អ្នកគ្រប់គ្រង' : (user.role === 'Teacher' ? 'គ្រូបង្រៀន' : 'និស្សិត')">
                            </span>
                        </td>

                        <td class="p-4">
                            <template x-if="user.role === 'Student'">
                                <div class="text-xs text-slate-600">
                                    <div x-text="`ថ្នាក់: ${user.class_name || 'N/A'}`" class="font-bold text-slate-700"></div>
                                    <div x-text="`${user.department_name || 'N/A'} • ${user.academic_year_name || ''}`"></div>
                                </div>
                            </template>
                            <template x-if="user.role === 'Teacher'">
                                <div class="text-xs text-slate-600">
                                    <div x-text="`ដេប៉ា: ${user.department_name || 'N/A'}`" class="font-bold text-slate-700"></div>
                                </div>
                            </template>
                            <template x-if="user.role === 'Admin'">
                                <span class="text-xs text-slate-400 italic">System Administrator</span>
                            </template>
                        </td>

                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded-md text-[10px] uppercase font-bold border"
                                  :class="user.status === 'Active' ? 'bg-green-50 text-green-600 border-green-200' : 'bg-rose-50 text-rose-600 border-rose-200'"
                                  x-text="user.status === 'Active' ? 'ដំណើរការ' : 'ផ្អាក'">
                            </span>
                        </td>
                        
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <button @click="openUserModal('edit', user)" class="p-2 text-amber-500 hover:bg-amber-50 rounded-lg transition-colors border border-transparent hover:border-amber-200" title="កែប្រែ">
                                    <i class="fas fa-user-edit"></i>
                                </button>
                                <button @click="deleteUser(user.id)" class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg transition-colors border border-transparent hover:border-rose-200" title="លុបគណនី">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>

                <tr x-show="filteredUsers.length === 0" x-cloak>
                    <td colspan="6" class="p-16 text-center text-slate-400 italic">
                        <div class="flex flex-col items-center gap-3">
                            <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center">
                                <i class="fas fa-users-slash text-2xl text-slate-300"></i>
                            </div>
                            <span>មិនមានទិន្នន័យអ្នកប្រើប្រាស់ដែលត្រូវគ្នានឹងការស្វែងរកឡើយ...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    {% include 'admin/user_modal.html' %}
</div>
