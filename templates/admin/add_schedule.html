<div x-show="isScheduleModalOpen" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4" x-cloak>
    
    <div class="fixed inset-0" @click="isScheduleModalOpen = false"></div>
    
    <div class="relative bg-white rounded-[24px] w-full max-w-2xl p-8 shadow-2xl font-khmer z-10 transform transition-all"
         x-show="isScheduleModalOpen"
         x-transition:enter="ease-out duration-300" 
         x-transition:enter-start="opacity-0 translate-y-8 scale-95" 
         x-transition:enter-end="opacity-100 translate-y-0 scale-100">
         
        <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600">
                    <i class="fas" :class="editingId ? 'fa-edit' : 'fa-calendar-plus'"></i>
                </div>
                <span x-text="editingId ? 'កែប្រែកាលវិភាគ' : 'បន្ថែមម៉ោងសិក្សាថ្មី'"></span>
            </h3>
            <button type="button" @click="isScheduleModalOpen = false" class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-50 text-slate-400 hover:text-rose-500 hover:bg-rose-50 transition-colors">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form @submit.prevent="saveSchedule()" class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
            
            <div class="col-span-1">
                <label for="schedule_department" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ដេប៉ាតឺម៉ង់ <span class="text-rose-500">*</span></label>
                <select id="schedule_department" x-model="scheduleForm.department_id" @change="scheduleForm.class_id = ''; scheduleForm.subject_id = ''; filterSchedules()"
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                    <option value="">-- ជ្រើសរើសដេប៉ាតឺម៉ង់ --</option>
                    <template x-for="dept in departments" :key="'modal-dept-' + dept.id">
                        <option :value="dept.id" x-text="dept.department_name"></option>
                    </template>
                </select>
            </div>

            <div class="col-span-1">
                <label for="schedule_academic_year" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ឆ្នាំសិក្សា <span class="text-rose-500">*</span></label>
                <select id="schedule_academic_year" x-model="scheduleForm.academic_year_id" @change="scheduleForm.class_id = ''; scheduleForm.subject_id = ''" 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                    <option value="">-- ជ្រើសរើសឆ្នាំសិក្សា --</option>
                    <template x-for="year in academic_years" :key="year.id">
                        <option :value="year.id" x-text="year.year_name"></option>
                    </template>
                </select>
            </div>

            <div class="col-span-1">
                <label for="class_id" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ថ្នាក់រៀន (Class) <span class="text-rose-500">*</span></label>
                <select id="class_id" x-model="scheduleForm.class_id" @change="onClassChange()" 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                    <option value="">-- ជ្រើសរើសថ្នាក់ --</option>
                    <template x-for="cls in filteredClassOptions" :key="cls.id">
                        <option :value="cls.id" 
                                x-text="`${cls.class_name} (វេន ${cls.session_type})`">
                        </option>
                    </template>
                </select>
            </div>

            <div class="col-span-1">
                <label for="subject_id" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">មុខវិជ្ជា <span class="text-rose-500">*</span></label>
                <select id="subject_id" x-model="scheduleForm.subject_id" 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                    <option value="">-- ជ្រើសរើសមុខវិជ្ជា --</option>
                    <template x-for="sub in filteredSubjects" :key="sub.id">
                        <option :value="sub.id" x-text="sub.subject_name"></option>
                    </template>
                </select>
            </div>

            <div class="col-span-1 md:col-span-2 border-t border-slate-100 my-2"></div>

            <div class="col-span-1 md:col-span-2">
                <label for="teacher_id" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">គ្រូបង្រៀន <span class="text-rose-500">*</span></label>
                <select id="teacher_id" x-model="scheduleForm.teacher_id" 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium text-indigo-700 focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                    <option value="">-- ជ្រើសរើសគ្រូបង្រៀន --</option>
                    <template x-for="teacher in filteredScheduleTeachers" :key="teacher.id">
                        <option :value="teacher.user_id || teacher.id" x-text="`${teacher.teacher_name} (${teacher.subject_teach || 'ទូទៅ'})`"></option>
                    </template>
                </select>
            </div>

            <div class="col-span-1">
                <label for="day_of_week" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ថ្ងៃសិក្សា <span class="text-rose-500">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fas fa-calendar-day text-xs"></i>
                    </div>
                    <select id="day_of_week" x-model="scheduleForm.day_of_week" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                        <option value="Monday">ថ្ងៃច័ន្ទ (Monday)</option>
                        <option value="Tuesday">ថ្ងៃអង្គារ (Tuesday)</option>
                        <option value="Wednesday">ថ្ងៃពុធ (Wednesday)</option>
                        <option value="Thursday">ថ្ងៃព្រហស្បតិ៍ (Thursday)</option>
                        <option value="Friday">ថ្ងៃសុក្រ (Friday)</option>
                        <option value="Saturday">ថ្ងៃសៅរ៍ (Saturday)</option>
                        <option value="Sunday">ថ្ងៃអាទិត្យ (Sunday)</option>
                    </select>
                </div>
            </div>

            <div class="col-span-1">
                <label for="room_id" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">បន្ទប់រៀន</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fas fa-door-open text-xs"></i>
                    </div>
                    <select id="room_id" x-model="scheduleForm.room_id" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer">
                        <option value="">-- ជ្រើសរើសបន្ទប់ --</option>
                        <template x-for="r in rooms" :key="r.id">
                            <option :value="r.id" x-text="r.room_number || r.room_name || r.room || 'N/A'"></option>
                        </template>
                    </select>
                </div>
            </div>

            <div class="col-span-1">
                <label for="start_time" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ម៉ោងចាប់ផ្តើម <span class="text-rose-500">*</span></label>
                <select id="start_time" x-model="scheduleForm.start_time" 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                    <option value="">-- ជ្រើសរើស --</option>
                    <template x-for="time in timeSlots" :key="'start-'+time">
                        <option :value="time" x-text="time"></option>
                    </template>
                </select>
            </div>
            <div class="col-span-1">
                <label for="end_time" class="block text-[13px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ម៉ោងបញ្ចប់ <span class="text-rose-500">*</span></label>
                <select id="end_time" x-model="scheduleForm.end_time" 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all cursor-pointer" required>
                    <option value="">-- ជ្រើសរើស --</option>
                    <template x-for="time in timeSlots" :key="'end-'+time">
                        <option :value="time" x-text="time"></option>
                    </template>
                </select>
            </div>

            <div class="col-span-1 md:col-span-2 flex justify-end gap-3 mt-4 border-t border-slate-100 pt-5">
                <button type="button" @click="isScheduleModalOpen = false" class="px-6 py-2.5 bg-white border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-colors">
                    បោះបង់
                </button>
                <button type="submit" class="px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl shadow-md shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all flex items-center gap-2">
                    <i class="fas fa-save"></i>
                    <span x-text="editingId ? 'រក្សាទុកការកែប្រែ' : 'រក្សាទុកទិន្នន័យ'"></span>
                </button>
            </div>
        </form>
    </div>
</div>
