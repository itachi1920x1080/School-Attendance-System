<div x-show="isStudentModalOpen"
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4 sm:p-6"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     x-cloak>

    <div @click.away="closeStudentModal()"
         x-show="isStudentModalOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-10 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         class="bg-white rounded-[24px] shadow-2xl shadow-slate-900/20 border border-slate-100 w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">

        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
            <h3 class="text-xl font-bold text-slate-800 font-khmer flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <span x-text="modalMode === 'add' ? 'បន្ថែមទិន្នន័យសិស្សថ្មី' : 'កែប្រែព័ត៌មានសិស្ស'"></span>
            </h3>
            <button type="button" @click="closeStudentModal()" title="បិទផ្ទាំង" class="text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full p-2.5 transition-all duration-200">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <form @submit.prevent="saveUser()" class="flex flex-col flex-1 overflow-hidden">

            <div class="p-8 overflow-y-auto font-khmer bg-slate-50/30 custom-scrollbar flex-1 space-y-5">

                <div x-show="userFormError" x-cloak class="rounded-xl border border-rose-200 bg-rose-50 text-rose-700 px-4 py-3 text-sm font-bold flex items-center gap-2 mb-2">
                    <i class="fas fa-exclamation-circle"></i>
                    <span x-text="userFormError"></span>
                </div>

                <h4 class="text-sm font-bold text-slate-800 border-b border-slate-200 pb-2"><i class="fas fa-id-card text-blue-500 mr-2"></i> ព័ត៌មានផ្ទាល់ខ្លួន</h4>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ឈ្មោះពេញ <span class="text-rose-500">*</span></label>
                        <input type="text" x-model="userForm.name" @input="generateEmail()" required placeholder="បញ្ចូលឈ្មោះឡាតាំង..."
                               class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm font-bold">
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">អត្តលេខសិស្ស (Auto)</label>
                           <input type="text" x-model="userForm.idNumber" readonly title="អត្តលេខសិស្ស"
                               class="w-full px-4 py-3 bg-slate-100 border border-slate-200 rounded-xl text-sm font-mono text-blue-700 focus:outline-none shadow-sm cursor-not-allowed font-bold">
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ភេទ</label>
                        <select x-model="userForm.gender" title="ភេទ" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm cursor-pointer">
                            <option value="Male">ប្រុស (Male)</option>
                            <option value="Female">ស្រី (Female)</option>
                            <option value="Other">ផ្សេងៗ (Other)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">អ៊ីមែលស្ថាប័ន <span class="text-rose-500">*</span></label>
                        <input type="email" x-model="userForm.email" required placeholder="name@hitech.edu"
                               class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm">
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ថ្ងៃខែឆ្នាំកំណើត</label>
                           <input type="date" x-model="userForm.dob" title="ថ្ងៃខែឆ្នាំកំណើត"
                               class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm">
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">លេខទូរសព្ទ</label>
                        <input type="text" x-model="userForm.phone" placeholder="012 XXX XXX"
                               class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm">
                    </div>

                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">អាសយដ្ឋានបច្ចុប្បន្ន</label>
                        <textarea x-model="userForm.address" placeholder="ផ្ទះលេខ, ផ្លូវ, ភូមិ, ឃុំ/សង្កាត់..." rows="2"
                                  class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm resize-none"></textarea>
                    </div>
                </div>

                <h4 class="text-sm font-bold text-slate-800 border-b border-slate-200 pb-2 mt-6"><i class="fas fa-graduation-cap text-blue-500 mr-2"></i> ព័ត៌មានសិក្សា</h4>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5 bg-blue-50/50 p-5 rounded-xl border border-blue-100">

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ស្ថានភាពគណនី</label>
                        <select x-model="userForm.status" title="ស្ថានភាពគណនី" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm cursor-pointer">
                            <option value="Active">សកម្ម (Active)</option>
                            <option value="Inactive">អសកម្ម (Inactive)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">មហាវិទ្យាល័យ (College)</label>
                        <select x-model="userForm.college" @change="userForm.department = ''; userForm.class_id = ''" title="មហាវិទ្យាល័យ" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm cursor-pointer">
                            <option value="">-- ជ្រើសរើសមហាវិទ្យាល័យ --</option>
                            <template x-for="col in colleges" :key="'col-'+col.id">
                                <option :value="col.id" x-text="col.college_name"></option>
                            </template>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ដេប៉ាតឺម៉ង់ <span class="text-rose-500">*</span></label>
                        <select x-model="userForm.department" @change="userForm.class_id = ''" required title="ដេប៉ាតឺម៉ង់" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm cursor-pointer">
                            <option value="">-- ជ្រើសរើសដេប៉ាតឺម៉ង់ --</option>
                            <template x-for="dept in departments.filter(d => !userForm.college || String(d.college_id) === String(userForm.college))" :key="'dept-'+dept.id">
                                <option :value="dept.id" x-text="dept.department_name"></option>
                            </template>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ឆ្នាំសិក្សា <span class="text-rose-500">*</span></label>
                        <select x-model="userForm.year" @change="userForm.class_id = ''" required title="ឆ្នាំសិក្សា" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm cursor-pointer">
                            <option value="">-- ជ្រើសរើសឆ្នាំសិក្សា --</option>
                            <template x-for="yr in academic_years" :key="'yr-'+yr.id">
                                <option :value="yr.id" x-text="yr.year_name"></option>
                            </template>
                        </select>
                    </div>

                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ថ្នាក់រៀន <span class="text-rose-500">*</span></label>
                        <select x-model="userForm.class_id" required title="ថ្នាក់រៀន"
                                :disabled="!userForm.department || !userForm.year"
                                :class="(!userForm.department || !userForm.year) ? 'bg-slate-100 opacity-60 cursor-not-allowed' : 'bg-white cursor-pointer'"
                                class="w-full px-4 py-3 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 transition-all duration-200 shadow-sm font-bold text-blue-700">
                            <option value="">-- ជ្រើសរើសថ្នាក់រៀន --</option>
                            <template x-for="cls in classes.filter(c => String(c.department_id) === String(userForm.department) && String(c.academic_year_id) === String(userForm.year))" :key="'cls-'+cls.id">
                                <option :value="cls.id" x-text="`${cls.class_name} (វេន ${cls.session_type === 'M' ? 'ព្រឹក' : (cls.session_type === 'A' ? 'រសៀល' : (cls.session_type === 'E' ? 'យប់' : 'សៅរ៍-អាទិត្យ'))})`"></option>
                            </template>
                        </select>
                        <p class="text-[10px] text-slate-400 mt-1.5 italic">* សូមជ្រើសរើសដេប៉ាតឺម៉ង់ និងឆ្នាំសិក្សាជាមុនសិន ទើបបញ្ជីថ្នាក់បង្ហាញឡើង។</p>
                    </div>
                </div>

            </div>

            <div class="px-8 py-5 border-t border-slate-100 bg-white flex justify-end gap-3 font-khmer shrink-0 rounded-b-[24px]">
                <button type="button" @click="closeStudentModal()" class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 hover:text-slate-800 hover:shadow-sm focus:outline-none focus:ring-4 focus:ring-slate-100 transition-all duration-200">
                    បោះបង់
                </button>
                <button type="submit" title="រក្សាទុកទិន្នន័យសិស្ស" class="px-6 py-2.5 rounded-xl text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-500/30 hover:shadow-lg hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-blue-500/30 transition-all duration-200 flex items-center gap-2">
                    <i class="fas fa-save"></i> <span x-text="modalMode === 'add' ? 'រក្សាទុកទិន្នន័យ' : 'កែប្រែទិន្នន័យ'"></span>
                </button>
            </div>

        </form>

    </div>
</div>
