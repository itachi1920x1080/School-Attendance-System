<div x-show="update_department" 
     style="display: none;"
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-cloak>
    
    <div @click.away="update_department = false"
         class="bg-white rounded-[24px] shadow-2xl border border-slate-100 w-full max-w-lg overflow-hidden flex flex-col font-khmer">
        
        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-amber-50 flex items-center justify-center text-amber-600">
                    <i class="fas fa-edit"></i>
                </div>
                <span>កែប្រែដេប៉ាតឺម៉ង់</span>
            </h3>
            <button @click="update_department = false" class="text-slate-400 hover:text-rose-500 rounded-full p-2 transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <div class="p-8 space-y-5 bg-slate-50/30">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">មហាវិទ្យាល័យមេ</label>
                <select x-model="deptForm.college_id" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-amber-500/10 outline-none transition-all">
                    <option value="">-- ជ្រើសរើសមហាវិទ្យាល័យ --</option>
                    {% for col in colleges %}
                        <option value="{{ col.id }}">{{ col.college_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ឈ្មោះដេប៉ាតឺម៉ង់</label>
                <input type="text" x-model="deptForm.name" placeholder="ឧ. វិទ្យាសាស្ត្រកុំព្យូទ័រ" 
                       class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-amber-500/10 outline-none transition-all">
            </div>
        </div>

        <div class="px-8 py-5 border-t border-slate-100 bg-white flex justify-end gap-3">
            <button @click="update_department = false" class="px-6 py-2.5 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-all">បោះបង់</button>
            <button @click="updateDepartment()" class="px-6 py-2.5 bg-amber-500 text-white rounded-xl font-bold shadow-lg shadow-amber-200 hover:bg-amber-600 transition-all flex items-center gap-2">
                <i class="fas fa-save"></i> រក្សាទុកការកែប្រែ
            </button>
        </div>
    </div>
</div>
