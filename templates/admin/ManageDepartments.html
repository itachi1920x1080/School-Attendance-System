<div x-show="activeTab === 'admin_department'" x-cloak class="space-y-6 font-khmer">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <h2 class="text-xl font-bold text-slate-800">រចនាសម្ព័ន្ធសាកលវិទ្យាល័យ</h2>
        
        <div class="flex flex-col sm:flex-row items-center gap-3 w-full sm:w-auto">
            <div class="relative w-full sm:w-64">
                <i class="fas fa-search absolute left-3 top-3 text-slate-400 text-sm"></i>
                <input type="text" 
                       x-model="searchQuery" 
                       placeholder="ស្វែងរកដេប៉ាតឺម៉ង់ ឬមហាវិទ្យាល័យ..." 
                       class="w-full pl-9 pr-4 py-2 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-600 transition-all">
            </div>
            <div>
                <select x-model="collegeFilter" 
                        title="តម្រៀបតាមមហាវិទ្យាល័យ" 
                        aria-label="តម្រៀបតាមមហាវិទ្យាល័យ" 
                        class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-600 outline-none transition-all shadow-sm">
                    <option value="">ទាំងអស់មហាវិទ្យាល័យ</option>
                    <template x-for="college in colleges" :key="college.id">
                        <option :value="String(college.id)" x-text="college.college_name"></option>
                    </template>
                </select>
            </div>
            <div>
                <select x-model="departmentFilter" 
                        title="តម្រៀបតាមដេប៉ាតឺម៉ង់" 
                        aria-label="តម្រៀបតាមដេប៉ាតឺម៉ង់" 
                        class="bg-white text-slate-700 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-blue-600 outline-none transition-all shadow-sm">
                    <option value="">ទាំងអស់ដេប៉ាតឺម៉ង់</option>
                    <template x-for="dept in departmentOptions" :key="dept.id">
                        <option :value="String(dept.id)" x-text="dept.department_name"></option>
                    </template>
                </select>
            </div>

            
            <button @click="add_department = true" 
                    class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2 whitespace-nowrap">
                <i class="fas fa-plus"></i> បន្ថែមដេប៉ាតឺម៉ង់
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <th class="p-4">មហាវិទ្យាល័យ & ដេប៉ាតឺម៉ង់</th>
                    <th class="p-4 text-right">សកម្មភាព</th> 
                </tr>
            </thead>
            <tbody class="text-sm">
                <template x-for="item in filteredUsers" :key="item.department_id || item.id">
                    <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition-colors duration-200">
                        <td class="p-4">
                            <div class="font-bold text-slate-700" x-text="item.department_name"></div>
                            <div class="text-[11px] text-blue-600 font-medium" x-text="item.college_name"></div>
                        </td>
                        <td class="p-4 text-right">
                            <div class="flex justify-end gap-2">
                                <button @click="openEditDeptModal(item)" class="p-2 text-amber-500 hover:bg-amber-50 rounded-lg transition-colors">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button @click="deleteDepartment(item.department_id || item.id)" class="p-2 text-rose-600 hover:bg-rose-50 rounded-lg transition-colors">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                </template>

                <tr x-show="filteredUsers.length === 0">
                    <td colspan="2" class="p-12 text-center text-slate-400 italic">មិនមានទិន្នន័យឡើយ...</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    {% include 'admin/add_department.html' %}
    {% include 'admin/Edit_department.html' %}
</div>
