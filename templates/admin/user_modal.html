<div x-show="isUserModalOpen" 
     style="display: none;"
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4 sm:p-6" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     x-cloak>
    
    <div @click.away="closeUserModal()"
         x-show="isUserModalOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-10 scale-95"
         x-transition:enter-end="opacity-100 translate-y-0 scale-100"
         class="bg-white rounded-[24px] shadow-2xl shadow-slate-900/20 border border-slate-100 w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
        
        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
            <h3 class="text-xl font-bold text-slate-800 font-khmer flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                    <i class="fas" :class="modalMode === 'add' ? 'fa-user-plus' : 'fa-user-edit'"></i>
                </div>
                <span x-text="modalMode === 'add' ? 'បន្ថែមអ្នកប្រើប្រាស់ថ្មី' : 'កែប្រែព័ត៌មានអ្នកប្រើប្រាស់'"></span>
            </h3>
            <button @click="closeUserModal()" class="text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full p-2.5 transition-all duration-200">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <div class="p-8 overflow-y-auto font-khmer bg-slate-50/30 custom-scrollbar flex-1">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
                
                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ឈ្មោះពេញ <span class="text-rose-500">*</span></label>
                    <input type="text" x-model="userForm.name" @input="generateEmail()" placeholder="បញ្ចូលឈ្មោះ..." 
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm">
                </div>
                
                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">តួនាទី <span class="text-rose-500">*</span></label>
                    <select x-model="userForm.role" @change="onRoleChange()" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm cursor-pointer">
                        <option value="Student">សិស្ស (Student)</option>
                        <option value="Teacher">គ្រូ (Teacher)</option>
                        <option value="Admin">អ្នកគ្រប់គ្រង (Admin)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ភេទ</label>
                    <select x-model="userForm.gender" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm cursor-pointer">
                        <option value="Male">ប្រុស (Male)</option>
                        <option value="Female">ស្រី (Female)</option>
                        <option value="Other">ផ្សេងៗ (Other)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">អ៊ីមែល <span class="text-rose-500">*</span></label>
                    <input type="email" x-model="userForm.email" placeholder="បញ្ចូលអ៊ីមែល..." 
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm">
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ថ្ងៃខែឆ្នាំកំណើត</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <i class="fas fa-calendar-alt text-[13px]"></i>
                        </div>
                        <input type="date" x-model="userForm.dob" 
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">លេខទូរសព្ទ</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <i class="fas fa-phone-alt text-[13px]"></i>
                        </div>
                        <input type="text" x-model="userForm.phone" placeholder="បញ្ចូលលេខទូរសព្ទ..." 
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm">
                    </div>
                </div>

                <div class="col-span-1 md:col-span-2">
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">អាសយដ្ឋានបច្ចុប្បន្ន</label>
                    <div class="relative">
                        <div class="absolute top-3.5 left-3.5 text-slate-400">
                            <i class="fas fa-map-marker-alt text-[13px]"></i>
                        </div>
                        <textarea x-model="userForm.address" placeholder="ផ្ទះលេខ, ផ្លូវ, ភូមិ, ឃុំ/សង្កាត់, ស្រុក/ខណ្ឌ, ខេត្ត/ក្រុង..." rows="2"
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm resize-none"></textarea>
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">លេខសម្គាល់ (ID / កាត)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <i class="fas fa-id-card text-[13px]"></i>
                        </div>
                        <input type="text" x-model="userForm.idNumber" placeholder="ឧ. STU-2026-1234" 
                               class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-blue-700 placeholder-slate-400 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm tracking-wide">
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ស្ថានភាព</label>
                    <select x-model="userForm.status" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm cursor-pointer">
                        <option value="Active">សកម្ម (Active)</option>
                        <option value="Inactive">អសកម្ម (Inactive)</option>
                    </select>
                </div>

                <div x-show="userForm.role === 'Student'" x-cloak>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ឆ្នាំសិក្សា</label>
                    <select x-model="userForm.year" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm cursor-pointer">
                        <option value="">-- ជ្រើសរើសឆ្នាំសិក្សា --</option>
                        <template x-for="yr in academic_years" :key="yr.id">
                            <option :value="yr.id" x-text="yr.year_name"></option>
                        </template>
                    </select>
                </div>

                <div x-show="userForm.role === 'Student' || userForm.role === 'Teacher'" x-cloak>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">សាកលវិទ្យាល័យ / មហាវិទ្យាល័យ</label>
                    <select x-model="userForm.college" @change="userForm.department = ''" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm cursor-pointer">
                        <option value="">-- ជ្រើសរើសសាកលវិទ្យាល័យ/មហាវិទ្យាល័យ --</option>
                        {% for col in colleges %}
                            <option value="{{ col.id }}">{{ col.college_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div x-show="userForm.role === 'Student' || userForm.role === 'Teacher'" x-cloak>
                    <label class="block text-[12px] font-bold text-slate-600 uppercase tracking-wide mb-1.5">ដេប៉ាតឺម៉ង់</label>
                    <select x-model="userForm.department" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/15 hover:border-slate-300 transition-all duration-200 shadow-sm cursor-pointer">
                        <option value="">-- ជ្រើសរើសដេប៉ាតឺម៉ង់ --</option>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}" x-show="userForm.college == '' || userForm.college == '{{ dept.college_id }}'">
                                {{ dept.department_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

            </div>
        </div>

        <div class="px-8 py-5 border-t border-slate-100 bg-white flex justify-end gap-3 font-khmer shrink-0 rounded-b-[24px]">
            <button @click="closeUserModal()" class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 hover:text-slate-800 hover:shadow-sm focus:outline-none focus:ring-4 focus:ring-slate-100 transition-all duration-200">
                បោះបង់
            </button>
            <button @click="saveUser()" class="px-6 py-2.5 rounded-xl text-sm font-bold text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 shadow-md shadow-blue-500/30 hover:shadow-lg hover:shadow-blue-500/40 hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-blue-500/30 transition-all duration-200 flex items-center gap-2">
                <i class="fas fa-save"></i> <span x-text="modalMode === 'add' ? 'រក្សាទុកទិន្នន័យ' : 'កែប្រែទិន្នន័យ'"></span>
            </button>
        </div>
        
    </div>
</div>
