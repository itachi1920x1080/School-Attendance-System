<div x-show="add_teacher_modal" 
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     x-cloak>
    
    <div @click.away="add_teacher_modal = false" 
         class="bg-white rounded-[24px] shadow-2xl border border-slate-100 w-full max-w-lg overflow-hidden flex flex-col font-khmer">
        
        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-teal-50 flex items-center justify-center text-teal-600">
                    <i class="fas fa-user-tie"></i>
                </div>
                <span>បន្ថែមគ្រូបង្រៀនថ្មី</span>
            </h3>
            <button type="button" title="បិទផ្ទាំងបន្ថែមគ្រូបង្រៀន" aria-label="បិទផ្ទាំងបន្ថែមគ្រូបង្រៀន" @click="add_teacher_modal = false" class="text-slate-400 hover:text-rose-500 rounded-full p-2 transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <form @submit.prevent="saveTeacher()" class="flex flex-col max-h-[85vh]">
            <div class="p-8 space-y-5 bg-slate-50/30 overflow-y-auto custom-scrollbar">
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ជ្រើសរើសគណនី (User Account) <span class="text-rose-500">*</span></label>
                    <select x-model="teacherForm.user_id" title="ជ្រើសរើសគណនីគ្រូ" aria-label="ជ្រើសរើសគណនីគ្រូ" required class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-teal-500/10 outline-none transition-all cursor-pointer font-bold text-teal-700">
                        <option value="">-- ជ្រើសរើសអ្នកប្រើប្រាស់ --</option>
                        <template x-for="u in availableUsers" :key="'user-'+u.id">
                            <option :value="u.id" x-text="u.name + ' (' + u.email + ')'"></option>
                        </template>
                    </select>
                    <p class="text-[10px] text-slate-400 mt-1.5 italic">* បង្ហាញតែគណនីដែលមានតួនាទីជា Teacher និងមិនទាន់មានក្នុងបញ្ជីគ្រូប៉ុណ្ណោះ</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">អត្តលេខគ្រូ <span class="text-rose-500">*</span></label>
                        <input type="text" x-model="teacherForm.teacher_code" required placeholder="ឧ. T-2026-001"
                               class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-teal-500/10 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ដេប៉ាតឺម៉ង់ <span class="text-rose-500">*</span></label>
                        <select x-model="teacherForm.department_id" title="ជ្រើសរើសដេប៉ាតឺម៉ង់" aria-label="ជ្រើសរើសដេប៉ាតឺម៉ង់" @change="teacherForm.subject_id = ''" required class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-teal-500/10 outline-none transition-all cursor-pointer">
                            <option value="">-- ជ្រើសរើស --</option>
                            <template x-for="dep in departments" :key="'dep-'+dep.id">
                                <option :value="dep.id" x-text="dep.department_name"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">មុខវិជ្ជាបង្រៀន/ជំនាញ <span class="text-rose-500">*</span></label>
                    <select x-model="teacherForm.subject_id" title="ជ្រើសរើសមុខវិជ្ជា" aria-label="ជ្រើសរើសមុខវិជ្ជា" 
                            :disabled="!teacherForm.department_id"
                            :class="!teacherForm.department_id ? 'bg-slate-100 opacity-60 cursor-not-allowed' : 'bg-white cursor-pointer'"
                            required class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-teal-500/10 outline-none transition-all">
                        <option value="">-- ជ្រើសរើស --</option>
                        <template x-for="sub in subjects.filter(s => String(s.department_id) === String(teacherForm.department_id))" :key="'sub-'+sub.id">
                            <option :value="sub.id" x-text="sub.subject_name"></option>
                        </template>
                    </select>
                </div>
            </div>

            <div class="px-8 py-5 border-t border-slate-100 bg-white flex justify-end gap-3 shrink-0">
                <button type="button" @click="add_teacher_modal = false" class="px-6 py-2.5 text-slate-500 font-bold border border-slate-200 hover:bg-slate-50 rounded-xl transition-all">បោះបង់</button>
                <button type="submit" class="px-6 py-2.5 bg-teal-600 text-white rounded-xl font-bold shadow-lg shadow-teal-200 hover:bg-teal-700 transition-all flex items-center gap-2">
                    <i class="fas fa-save"></i> រក្សាទុក
                </button>
            </div>
        </form>
    </div>
</div>
