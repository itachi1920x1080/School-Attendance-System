<div x-show="activeTab === 'admin_attendance'" x-cloak class="space-y-6 font-khmer">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <h2 class="text-xl font-bold text-slate-800">របាយការណ៍វត្តមានសិស្ស (Attendance Report)</h2>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap gap-4 items-end">
        <div class="w-full sm:w-auto flex-1">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">កាលបរិច្ឆេទ</label>
            <input type="date" x-model="adminAttFilter.date" 
                   class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
        </div>
        <div class="w-full sm:w-auto flex-1">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ថ្នាក់រៀន</label>
            <select x-model="adminAttFilter.class_id" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none transition-all">
                <option value="">-- គ្រប់ថ្នាក់ទាំងអស់ --</option>
                <template x-for="cls in classes" :key="cls.id">
                    <option :value="cls.id" x-text="cls.class_name"></option>
                </template>
            </select>
        </div>
        <div class="w-full sm:w-auto flex gap-3">
            <button type="button" @click="fetchAdminAttendance()" class="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-emerald-200 flex items-center justify-center gap-2">
                <i class="fas fa-search"></i> ចម្រាញ់
            </button>

            <button type="button" @click="exportToExcel()" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-lg shadow-green-200 flex items-center justify-center gap-2">
                <i class="fas fa-file-excel"></i> Export Excel
            </button>
        </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <th class="p-4">ថ្ងៃខែឆ្នាំ</th>
                    <th class="p-4">ឈ្មោះសិស្ស</th>
                    <th class="p-4">ថ្នាក់ / មុខវិជ្ជា</th>
                    <th class="p-4">កត់ដោយ (គ្រូ)</th>
                    <th class="p-4 text-center">ស្ថានភាព</th>
                    <th class="p-4 text-right">សកម្មភាព</th>
                </tr>
            </thead>
            <tbody class="text-sm">
                <template x-for="att in adminAttendanceList" :key="att.id">
                    <tr class="border-b border-slate-50 hover:bg-emerald-50/30 transition-colors">
                        <td class="p-4 text-slate-500 font-medium" x-text="formatDate(att.attendance_date)"></td>
                        <td class="p-4 font-bold text-slate-700" x-text="att.student_name"></td>
                        <td class="p-4">
                            <div class="font-bold text-emerald-600" x-text="att.class_name"></div>
                            <div class="text-[11px] text-slate-500" x-text="att.subject_name"></div>
                        </td>
                        <td class="p-4 text-slate-600 text-xs" x-text="att.teacher_name"></td>
                        <td class="p-4 text-center">
                            <span :class="{
                                    'bg-emerald-100 text-emerald-700': att.status === 'Present',
                                    'bg-rose-100 text-rose-700': att.status === 'Absent',
                                    'bg-amber-100 text-amber-700': att.status === 'Late',
                                    'bg-blue-100 text-blue-700': att.status === 'Excused'
                                  }"
                                  class="px-2.5 py-1 rounded-lg text-[11px] font-bold"
                                  x-text="att.status === 'Present' ? 'វត្តមាន' : (att.status === 'Absent' ? 'អវត្តមាន' : (att.status === 'Late' ? 'យឺត' : 'ច្បាប់'))">
                            </span>
                            <div x-show="att.remarks" class="text-[10px] text-slate-400 mt-1" x-text="'(' + att.remarks + ')'"></div>
                        </td>
                        
                        <td class="p-4 text-right">
                            <button type="button" @click="openAdminEditAtt(att)" 
                                    class="p-2 text-amber-500 hover:bg-amber-50 hover:text-amber-600 rounded-lg transition-colors" title="កែប្រែវត្តមាន">
                                <i class="fas fa-edit"></i>
                            </button>
                        </td>
                    </tr>
                </template>
                <tr x-show="adminAttendanceList.length === 0">
                    <td colspan="6" class="p-12 text-center text-slate-400 italic">មិនមានទិន្នន័យវត្តមានឡើយ...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div x-show="admin_edit_att_modal"
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-cloak>

    <div @click.away="admin_edit_att_modal = false"
         class="bg-white rounded-[24px] shadow-2xl border border-slate-100 w-full max-w-md overflow-hidden flex flex-col font-khmer">

        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white">
            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-amber-50 flex items-center justify-center text-amber-600">
                    <i class="fas fa-user-edit"></i>
                </div>
                <span>កែប្រែស្ថានភាពវត្តមាន</span>
            </h3>
            <button type="button" @click="admin_edit_att_modal = false" class="text-slate-400 hover:text-rose-500 transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <div class="p-6 space-y-4 bg-slate-50/30">
            <div class="p-3 bg-blue-50 text-blue-800 rounded-xl text-sm border border-blue-100">
                សិស្ស៖ <span class="font-bold" x-text="editAttForm.student_name"></span><br>
                មុខវិជ្ជា៖ <span class="font-bold" x-text="editAttForm.subject_name"></span>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ស្ថានភាពថ្មី</label>
                <select x-model="editAttForm.status" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition-all">
                    <option value="Present">វត្តមាន (Present)</option>
                    <option value="Absent">អវត្តមាន (Absent)</option>
                    <option value="Late">យឺត (Late)</option>
                    <option value="Excused">ច្បាប់ (Excused)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">មូលហេតុ / ចំណាំ</label>
                <input type="text" x-model="editAttForm.remarks" placeholder="បញ្ចូលមូលហេតុ..."
                       class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none transition-all">
            </div>
        </div>

        <div class="px-6 py-4 border-t border-slate-100 bg-white flex justify-end gap-3">
            <button type="button" @click="admin_edit_att_modal = false" class="px-5 py-2 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-all">បោះបង់</button>
            <button type="button" @click="saveAdminAttendanceEdit()" class="px-5 py-2 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition-all shadow-lg shadow-amber-200 flex items-center gap-2">
                <i class="fas fa-save"></i> រក្សាទុកការកែប្រែ
            </button>
        </div>
    </div>
</div>
