<div x-show="isClassModalOpen && classModalMode === 'add'"
     class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-cloak>
    
    <div @click.away="isClassModalOpen = false; add_class_modal = false"
         class="bg-white rounded-[24px] shadow-2xl border border-slate-100 w-full max-w-lg overflow-hidden flex flex-col font-khmer">
        
        <div class="px-8 py-5 border-b border-slate-100 flex justify-between items-center bg-white">
            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                    <i class="fas fa-university"></i>
                </div>
                <span>បន្ថែមថ្នាក់ថ្មី</span>
            </h3>
            <button type="button" @click="isClassModalOpen = false; add_class_modal = false" title="បិទបង្អួច" aria-label="បិទបង្អួច" class="text-slate-400 hover:text-rose-500 rounded-full p-2 transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <form @submit.prevent="saveClass()" class="flex flex-col max-h-[85vh]">
            <div class="p-8 space-y-5 bg-slate-50/30 overflow-y-auto custom-scrollbar">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">អាគារ <span class="text-rose-500">*</span></label>
                        <select x-model="classForm.building_id" @change="classForm.room_id = ''" required title="អាគារ" aria-label="អាគារ" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all cursor-pointer">
                            <option value="">-- ជ្រើសរើស --</option>
                            <template x-for="building in buildings" :key="building.id">
                                <option :value="building.id" x-text="building.building_name"></option>
                            </template>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">បន្ទប់រៀន <span class="text-rose-500">*</span></label>
                        <select x-model="classForm.room_id" required 
                                :disabled="!classForm.building_id"
                                :class="!classForm.building_id ? 'opacity-50 bg-slate-100 cursor-not-allowed' : 'bg-white cursor-pointer'"
                                title="បន្ទប់រៀន" aria-label="បន្ទប់រៀន" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                            <option value="">-- ជ្រើសរើស --</option>
                            <template x-for="r in rooms.filter(room => String(room.building_id) === String(classForm.building_id))" :key="'room-'+r.id">
                                <option :value="r.id" x-text="r.room_number || r.room_name"></option>
                            </template>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ដេប៉ាតឺម៉ង់ <span class="text-rose-500">*</span></label>
                    <select x-model="classForm.department_id" required title="ដេប៉ាតឺម៉ង់" aria-label="ដេប៉ាតឺម៉ង់" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all cursor-pointer">
                        <option value="">-- ជ្រើសរើសដេប៉ាតឺម៉ង់ --</option>
                        {% for dep in departments %}
                            <option value="{{ dep.id }}">{{ dep.department_name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">វេនសិក្សា <span class="text-rose-500">*</span></label>
                        <select x-model="classForm.session_type" required title="វេនសិក្សា" aria-label="វេនសិក្សា" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all cursor-pointer">
                            <option value="">-- ជ្រើសរើស --</option>
                            <option value="M">វេនព្រឹក</option>
                            <option value="A">វេនរសៀល</option>
                            <option value="E">វេនយប់</option>
                            <option value="SLS">សៅរ៍-អាទិត្យ</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ឆ្នាំសិក្សា <span class="text-rose-500">*</span></label>
                        <select x-model="classForm.academic_year_id" required title="ឆ្នាំសិក្សា" aria-label="ឆ្នាំសិក្សា" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all cursor-pointer">
                            <option value="">-- ជ្រើសរើស --</option>
                            <template x-for="year in academic_years" :key="'year-'+year.id">
                                <option :value="year.id" x-text="year.year_name"></option>
                            </template>
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">ឈ្មោះថ្នាក់ <span class="text-rose-500">*</span></label>
                    <input type="text" x-model="classForm.class_name" required placeholder="ឧ. M5"
                           class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-bold text-blue-600">
                </div>

            </div>

            <div class="px-8 py-5 border-t border-slate-100 bg-white flex justify-end gap-3 shrink-0">
                <button type="button" @click="isClassModalOpen = false; add_class_modal = false" class="px-6 py-2.5 text-slate-500 font-bold hover:bg-slate-50 rounded-xl transition-all border border-slate-200">បោះបង់</button>
                
                <button type="submit" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 hover:-translate-y-0.5 transition-all flex items-center gap-2">
                    <i class="fas fa-save"></i> រក្សាទុក
                </button>
            </div>
        </form>
    </div>
</div>
