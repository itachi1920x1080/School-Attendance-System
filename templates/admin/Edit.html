<div x-show="isUserModalOpen" class="fixed inset-0 z-[70] flex items-center justify-center overflow-y-auto overflow-x-hidden p-4 sm:p-0" x-cloak>
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" @click="closeUserModal()" x-show="isUserModalOpen" x-transition.opacity></div>
    
    <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-xl my-auto transform transition-all"
         x-show="isUserModalOpen" 
         x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
         x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95">
         
         <div class="max-h-[90vh] overflow-y-auto p-6 sm:p-8 custom-scrollbar">
            <div class="flex items-center justify-between mb-5 border-b border-slate-100 pb-4">
                <h3 class="text-xl font-bold text-slate-800 font-khmer flex items-center gap-2">
                    <i class="fas text-blue-600" :class="modalMode === 'add' ? 'fa-user-plus' : 'fa-user-edit'"></i>
                    <span x-text="modalMode === 'add' ? 'បន្ថែមអ្នកប្រើប្រាស់ថ្មី' : 'កែប្រែព័ត៌មានអ្នកប្រើប្រាស់'"></span>
                </h3>
                <button type="button" @click="closeUserModal()" class="text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg p-2 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <form @submit.prevent="saveUser()" class="space-y-5 font-khmer">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">តួនាទី (Role) <span class="text-rose-500">*</span></label>
                        <select x-model="userForm.role" @change="onRoleChange()" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all cursor-pointer">
                            {% if roles %}
                                {% for role in roles %}
                                    <option value="{{ role }}">{{ role }}</option>
                                {% endfor %}
                            {% else %}
                                <option value="Student">សិស្ស (Student)</option>
                                <option value="Teacher">គ្រូ (Teacher)</option>
                                <option value="Admin">អ្នកគ្រប់គ្រង (Admin)</option>
                            {% endif %}
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ស្ថានភាព (Status) <span class="text-rose-500">*</span></label>
                        <select x-model="userForm.status" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all cursor-pointer">
                            <option value="Active">សកម្ម (Active)</option>
                            <option value="Inactive">អសកម្ម (Inactive)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ឈ្មោះពេញ (Full Name) <span class="text-rose-500">*</span></label>
                        <input type="text" x-model="userForm.name" @input="generateEmail()" required placeholder="ឧទាហរណ៍៖ សុខ សាន្ត" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ភេទ (Sex)</label>
                        <select x-model="userForm.gender" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all cursor-pointer">
                            <option value="Male">ប្រុស</option>
                            <option value="Female">ស្រី</option>
                        </select>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">អ៊ីមែល (Email) <span class="text-rose-500">*</span></label>
                        <input type="email" x-model="userForm.email" required placeholder="sok.san@email.com" class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-blue-50/30 transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">លេខទូរស័ព្ទ (Phone)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400"><i class="fas fa-phone-alt text-xs"></i></div>
                            <input type="tel" x-model="userForm.phone" placeholder="012 345 678" class="w-full pl-9 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ថ្ងៃកំណើត (DOB)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400"><i class="fas fa-calendar-alt text-xs"></i></div>
                            <input type="date" x-model="userForm.dob" class="w-full pl-9 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all text-slate-700">
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">អាសយដ្ឋាន (Address)</label>
                    <textarea x-model="userForm.address" rows="2" placeholder="ឧ. ផ្ទះលេខ, ផ្លូវ, សង្កាត់, ខណ្ឌ..." class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all resize-none"></textarea>
                </div>

                <div class="bg-slate-50 p-5 rounded-xl border border-slate-100">
                    <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 border-b border-slate-200 pb-2 flex items-center gap-2">
                        <i class="fas fa-info-circle"></i> <span x-text="userForm.role + ' Information'"></span>
                    </h4>
                    
                    <div x-show="userForm.role === 'Student' || userForm.role === 'Teacher'" class="space-y-4" x-cloak>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">អត្តលេខ (ID Number)</label>
                                <input type="text" x-model="userForm.idNumber" :placeholder="userForm.role === 'Student' ? 'STU-XXXX' : 'TCH-XXXX'" class="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm font-medium text-blue-700 outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all bg-white">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">មហាវិទ្យាល័យ (College)</label>
                                <select x-model="userForm.college" @change="userForm.department = ''" class="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all cursor-pointer">
                                    <option value="">-- ជ្រើសរើស --</option>
                                    {% for col in colleges %}
                                        <option value="{{ col.id }}">{{ col.college_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">ដេប៉ាតឺម៉ង់ (Department)</label>
                            <select x-model="userForm.department" class="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all cursor-pointer">
                                <option value="">-- ជ្រើសរើសដេប៉ាតឺម៉ង់ --</option>
                                {% for dept in departments %}
                                    <option value="{{ dept.id }}" x-show="userForm.college == '' || userForm.college == '{{ dept.college_id }}'">
                                        {{ dept.department_name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div x-show="userForm.role === 'Student'" class="grid grid-cols-2 gap-4" x-cloak>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">ឆ្នាំសិក្សា (Year)</label>
                                <select x-model="userForm.year" class="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all cursor-pointer">
                                    <option value="">-- ជ្រើសរើស --</option>
                                    {% for yr in academic_years %}
                                        <option value="{{ yr.id }}">{{ yr.year_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">ថ្នាក់រៀន (Class)</label>
                                <select x-model="userForm.class_id" class="w-full border border-slate-200 rounded-lg px-4 py-2 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 bg-white transition-all cursor-pointer">
                                    <option value="">-- ជ្រើសរើស --</option>
                                    {% for cls in classes %}
                                        <option value="{{ cls.id }}">{{ cls.class_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div x-show="userForm.role === 'Admin'" x-cloak>
                        <div class="flex items-start gap-3 text-blue-700 bg-blue-100/50 p-3 rounded-lg border border-blue-200">
                            <i class="fas fa-shield-alt mt-0.5"></i>
                            <p class="text-xs font-medium leading-relaxed">
                                គណនី Admin មានសិទ្ធិពេញលេញលើការគ្រប់គ្រងប្រព័ន្ធ។ សូមប្រាកដថាព័ត៌មានដែលបានបញ្ចូលពិតជាត្រឹមត្រូវ។
                            </p>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 flex justify-end gap-3 pt-4 border-t border-slate-100">
                    <button type="button" @click="closeUserModal()" class="px-5 py-2.5 rounded-lg text-sm font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 hover:text-slate-700 transition-all focus:ring-4 focus:ring-slate-100">
                        បោះបង់
                    </button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-bold transition-all shadow-md shadow-blue-500/30 hover:shadow-lg hover:-translate-y-0.5 flex items-center gap-2 focus:ring-4 focus:ring-blue-500/30">
                        <i class="fas fa-save"></i>
                        <span x-text="modalMode === 'add' ? 'រក្សាទុក' : 'រក្សាទុកការកែប្រែ'"></span>
                    </button>
                </div>
            </form>
         </div>
    </div>
</div>
